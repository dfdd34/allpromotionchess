<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>옴니-프로모션 체스</title>
<style>
    body{margin:0;font-family:system-ui,Apple SD Gothic Neo,Segoe UI,sans-serif;text-align:center;background:#fafafa;color:#333}
    h1{margin:12px 0;font-weight:700;font-size:1.6rem}
    #connection{margin-bottom:8px}
    #connection input{padding:4px 6px;font-size:1rem;width:110px}
    #connection button{padding:4px 10px;margin-left:4px;font-size:1rem;cursor:pointer}
    #status{display:inline-block;width:10px;height:10px;margin-left:8px;border-radius:50%;background:#ccc;vertical-align:middle}
    #status.online{background:#2ecc71}
    #status.offline{background:#e74c3c}
    canvas{background:#fff;border:2px solid #333;touch-action:none}
    /* 승급 모달 */
    #promo{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
           backdrop-filter:blur(3px);background:rgba(0,0,0,.45);z-index:10}
    #promo.hidden{display:none}
    #promo p{color:#fff;margin-bottom:12px;font-size:1.2rem;font-weight:600}
    #promo button{padding:8px 16px;margin:4px;font-size:1rem;width:90px;cursor:pointer}
</style>
</head>
<body>
<h1>옴니-프로모션 체스</h1>

<div id="connection">
    <label>
        방 코드&nbsp;
        <input id="room" placeholder="예: ABC123" />
    </label>
    <button id="create">방 만들기</button>
    <button id="join">입장</button>
    <span id="status" class="offline"></span>
</div>

<canvas id="board" width="480" height="480"></canvas>

<!-- 승급 모달 -->
<div id="promo" class="hidden">
    <p>어떤 기물로 승급하시겠습니까?</p>
    <div>
        <button data-piece="q">퀸</button>
        <button data-piece="r">룩</button>
        <button data-piece="b">비숍</button>
        <button data-piece="n">나이트</button>
    </div>
</div>

<script>
/* ======================= 설정 ======================= */
const WS_URL = "wss://allpromotionchess.onrender.com";    // ← 실제 Render WebSocket 엔드포인트로 교체하세요
const TILE   = 60;                                      // 한 칸 60px (8*60=480)
/* ===================== 유틸 함수 ===================== */
function $(id){return document.getElementById(id);}
function send(ws,obj){ws.readyState===1&&ws.send(JSON.stringify(obj));}
function status(on){$("status").className = on ? "online" : "offline";}
/* ============== 체스 엔진 (경량/자체 구현) ============== */
class Chess{
    constructor(fen=Chess.START_FEN){this.load(fen);}
    /* ------------ FEN 파싱/직렬화 ------------ */
    load(fen){
        const parts=fen.trim().split(/\s+/);
        if(parts.length<2)throw Error("잘못된 FEN");
        this.board=[...Array(8)].map(()=>Array(8).fill(null));
        let [rows,turn]=parts;
        rows.split("/").forEach((row,y)=>{
            let x=0;
            for(const c of row){
                if(/\d/.test(c)){x+=+c;continue;}
                this.board[y][x++]=c;
            }
        });
        this.turn=turn;
    }
    fen(){
        const rows=this.board.map(r=>{
            let s="",cnt=0;
            r.forEach(p=>{
                if(!p)cnt++;
                else{ if(cnt){s+=cnt;cnt=0;} s+=p;}
            });
            return cnt?s+cnt:s;
        }).join("/");
        return `${rows} ${this.turn}`;
    }
    /* ------------ 내부 헬퍼 ------------ */
    inBounds(x,y){return x>=0&&x<8&&y>=0&&y<8;}
    pieceColor(p){return p===p?.toUpperCase()?"w":"b";}
    dir(a){return a==="w"?-1:1;}          // 폰 진행 방향
    isBackRank(y,color){return color==="w"?y===0:y===7;}
    cloneBoard(){return this.board.map(r=>r.slice());}
    /* ------------ 이동 유효성 검사 ------------ */
    canMove(sx,sy,tx,ty){
        if(!this.inBounds(sx,sy)||!this.inBounds(tx,ty))return false;
        const p=this.board[sy][sx];
        if(!p||this.pieceColor(p)!==this.turn)return false;
        const target=this.board[ty][tx];
        if(target&&this.pieceColor(target)===this.turn)return false;
        const dx=tx-sx, dy=ty-sy, adx=Math.abs(dx), ady=Math.abs(dy);
        switch(p.toLowerCase()){
            case "p":{                             // 폰
                if(dx===0&&target)return false;
                if(dx===0&&dy===this.dir(this.turn)&&!target)return true;
                if(adx===1&&dy===this.dir(this.turn)&&target)return true;
                return false;
            }
            case "n": return adx*ady===2;          // 나이트
            case "b": return adx===ady&&this.clearDiag(sx,sy,tx,ty);
            case "r": return (dx===0||dy===0)&&this.clearLine(sx,sy,tx,ty);
            case "q": return (adx===ady?this.clearDiag(sx,sy,tx,ty): (dx===0||dy===0)&&this.clearLine(sx,sy,tx,ty));
            case "k": return Math.max(adx,ady)===1;
        }
        return false;
    }
    clearLine(sx,sy,tx,ty){
        const stepX=Math.sign(tx-sx), stepY=Math.sign(ty-sy);
        for(let x=sx+stepX,y=sy+stepY; x!==tx||y!==ty; x+=stepX,y+=stepY){
            if(this.board[y][x])return false;
        }
        return true;
    }
    clearDiag(...a){return this.clearLine(...a);}
    /* ------------ 실제 이동 처리 ------------ */
    moveCoords(sx,sy,tx,ty){
        if(!this.canMove(sx,sy,tx,ty))return {ok:false};
        const piece=this.board[sy][sx];
        const next=this.cloneBoard();
        next[sy][sx]=null;
        next[ty][tx]=piece;
        // 승급(왕 제외, 퀸/룩/비숍/나이트 선택)
        let promo=null;
        if(["p","r","b","n"].includes(piece.toLowerCase()) && this.isBackRank(ty,this.turn)){
            promo=true;
        }
        // 턴 전환
        const tmpTurn=this.turn==="w"?"b":"w";
        const newFen=new Chess().fen; // placeholder, replaced below
        const inst=new Chess();
        inst.board=next;
        inst.turn=tmpTurn;
        return{ok:true,fen:inst.fen(),promo};
    }
    promote(x,y,choice,color){
        const chosen=color==="w"?choice.toUpperCase():choice.toLowerCase();
        this.board[y][x]=chosen;
        this.turn=color==="w"?"b":"w";
    }
}
Chess.START_FEN="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w";
/* ===================== 전역 변수 ===================== */
let chess   = new Chess();
let socket  = null;
let myColor = "w";
let roomId  = "";
let dragging = null;
/* ================ 캔버스 렌더링 ================= */
const ctx = $("board").getContext("2d");
const img = new Image();
img.src = "https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/piece/cburnett/128.png"; // 무료 피스 세트
img.onload = draw;
function draw(){
    ctx.clearRect(0,0,480,480);
    // 바둑판
    for(let y=0;y<8;y++){
        for(let x=0;x<8;x++){
            ctx.fillStyle=(x+y)&1?"#769656":"#eeeed2";
            ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
        }
    }
    // 기물
    for(let y=0;y<8;y++){
        for(let x=0;x<8;x++){
            const p=chess.board[y][x];
            if(!p)continue;
            if(dragging&&dragging.from.x===x&&dragging.from.y===y)continue;
            drawPiece(p,x,y);
        }
    }
    // 드래그 중 그림자
    if(dragging){
        const {mx,my}=dragging;
        ctx.globalAlpha=0.8;
        drawPiece(dragging.piece,(mx-30)/TILE,(my-30)/TILE,true);
        ctx.globalAlpha=1;
    }
}
function drawPiece(p,x,y,byPixel=false){
    const base={k:0,q:1,r:2,b:3,n:4,p:5};
    const col=p===p.toUpperCase()?0:1;
    const row=base[p.toLowerCase()];
    const sx=row*128, sy=col*128;
    const dx=byPixel?x*TILE:x*TILE, dy=byPixel?y*TILE:y*TILE;
    ctx.drawImage(img,sx,sy,128,128,dx,dy,TILE,TILE);
}
/* ============== 마우스 인터랙션 ============== */
$("board").addEventListener("mousedown",e=>{
    const rect=e.target.getBoundingClientRect();
    const x=Math.floor((e.clientX-rect.left)/TILE);
    const y=Math.floor((e.clientY-rect.top )/TILE);
    const p=chess.board[y][x];
    if(!p||chess.pieceColor(p)!==myColor)return;
    dragging={from:{x,y},piece:p,mx:e.clientX-rect.left,my:e.clientY-rect.top};
});
$("board").addEventListener("mousemove",e=>{
    if(!dragging)return;
    const rect=e.target.getBoundingClientRect();
    dragging.mx=e.clientX-rect.left;
    dragging.my=e.clientY-rect.top;
    draw();
});
$("board").addEventListener("mouseup",e=>{
    if(!dragging)return;
    const rect=e.target.getBoundingClientRect();
    const tx=Math.floor((e.clientX-rect.left)/TILE);
    const ty=Math.floor((e.clientY-rect.top )/TILE);
    const move=chess.moveCoords(dragging.from.x,dragging.from.y,tx,ty);
    dragging=null;
    draw();
    if(move.ok){
        if(move.promo){
            showPromo(move,tx,ty);
        }else{
            chess.load(move.fen);
            pushMove(move.fen);
            draw();
        }
    }
});
/* ================ 승급 처리 ================ */
function showPromo(move,x,y){
    const modal=$("promo");
    modal.classList.remove("hidden");
    modal.querySelectorAll("button").forEach(btn=>{
        btn.onclick=()=>{
            modal.classList.add("hidden");
            chess.promote(x,y,btn.dataset.piece,myColor);
            const newFen=chess.fen();
            pushMove(newFen);
            draw();
        };
    });
}
/* =============== 네트워크 =============== */
function connect(){
    socket=new WebSocket(WS_URL);
    socket.onopen = ()=>status(true);
    socket.onclose=()=>status(false);
    socket.onmessage=e=>{
        let msg;
        try{msg=JSON.parse(e.data);}catch{console.warn("JSON 파싱 실패",e.data);return;}
        if(msg.type==="sync_state"){
            chess.load(msg.fen);
            myColor=msg.color;
            draw();
        }
    };
}
function pushMove(fen){
    send(socket,{type:"sync_state",room:roomId,fen});
}
/* ============= 방 생성 / 입장 ============= */
$("create").onclick = ()=>{
    if(socket)socket.close();
    roomId=$("room").value.trim().toUpperCase()||Math.random().toString(36).substr(2,6).toUpperCase();
    $("room").value=roomId;
    connect();
    send(socket,{type:"create",room:roomId});
    alert(`방이 생성되었습니다.\n코드: ${roomId}`);
};
$("join").onclick = ()=>{
    roomId=$("room").value.trim().toUpperCase();
    if(!roomId)return alert("방 코드를 입력하세요.");
    if(socket)socket.close();
    connect();
    send(socket,{type:"join",room:roomId});
};
/* 최초 연결 상태표시 */
status(false);
</script>
</body>
</html>
