<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni-Promotion Chess</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 520px 1fr;
      gap: 24px;
      align-items: start;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    .panel {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 60px);
      grid-template-rows: repeat(8, 60px);
      width: 480px;
      height: 480px;
      border: 2px solid #444;
      margin-top: 12px;
    }
    .sq {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      user-select: none;
      cursor: pointer;
    }
    .light { background: #f0d9b5; color: #111; }
    .dark  { background: #b58863; color: #111; }
    .selected {
      outline: 3px solid #00d1ff;
      outline-offset: -3px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }
    button, input, select {
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }
    button:hover {
      background: #2a2a2a;
      cursor: pointer;
    }
    input {
      min-width: 160px;
    }
    #status {
      padding: 10px 12px;
      background: #151515;
      border: 1px solid #333;
      border-radius: 8px;
      margin-top: 12px;
      min-height: 20px;
    }
    .hint {
      color: #bbb;
      font-size: 13px;
      line-height: 1.5;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin: 8px 0;
    }
    .label {
      min-width: 70px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Omni-Promotion Chess</h1>
      <div class="hint">
        - 온라인 모드에서는 Render WebSocket 서버를 사용합니다.<br>
        - 일반 승격은 폰만, Omni-Promotion은 다른 말도 백랭크 도달 시 퀸으로 변합니다.
      </div>

      <div class="row">
        <span class="label">Mode</span>
        <select id="mode">
          <option value="single">single</option>
          <option value="online">online</option>
        </select>
      </div>

      <div class="row">
        <span class="label">Room</span>
        <input id="roomId" type="text" placeholder="room id" />
      </div>

      <div class="controls">
        <button onclick="createRoom()">Create</button>
        <button onclick="joinRoom()">Join</button>
        <button onclick="connectWS()">Connect</button>
        <button onclick="resetGame()">Reset</button>
        <button onclick="analyzePosition()">Analyze</button>
      </div>

      <div id="status">준비됨</div>
      <div id="board"></div>
    </div>

    <div class="panel">
      <h2>Game Info</h2>
      <div id="info" class="hint">
        말 클릭 → 이동 시도.<br>
        온라인 연결 후에는 상대 수가 실시간으로 전달됩니다.
      </div>
      <hr style="border-color:#333; margin:16px 0;">
      <div class="hint">
        <b>주의</b><br>
        이 파일에는 기본적인 온라인 연결이 포함되어 있습니다.<br>
        실제 턴 검증/전체 동기화는 다음 단계에서 강화할 수 있습니다.
      </div>
    </div>
  </div>

  <script>
    const WS_URL = "https://allpromotionchess.onrender.com/";

    let ws = null;
    let mySide = null;

    const state = {
      board: [],
      turn: "white",
      selected: null,
      online: false
    };

    const unicode = {
      wp: "♙", wn: "♘", wb: "♗", wr: "♖", wq: "♕", wk: "♔",
      bp: "♟", bn: "♞", bb: "♝", br: "♜", bq: "♛", bk: "♚"
    };

    function setStatus(text) {
      const el = document.getElementById("status");
      if (el) el.textContent = text;
    }

    function setInfo(text) {
      const el = document.getElementById("info");
      if (el) el.innerHTML = text;
    }

    function makeInitialBoard() {
      return [
        ["br","bn","bb","bq","bk","bb","bn","br"],
        ["bp","bp","bp","bp","bp","bp","bp","bp"],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ["wp","wp","wp","wp","wp","wp","wp","wp"],
        ["wr","wn","wb","wq","wk","wb","wn","wr"]
      ];
    }

    function resetGame() {
      state.board = makeInitialBoard();
      state.turn = "white";
      state.selected = null;
      renderBoard();
      setStatus("게임 초기화 완료");
    }

    function renderBoard() {
      const boardEl = document.getElementById("board");
      boardEl.innerHTML = "";

      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const sq = document.createElement("div");
          const piece = state.board[r][c];
          sq.className = "sq " + (((r + c) % 2 === 0) ? "light" : "dark");
          if (state.selected && state.selected.r === r && state.selected.c === c) {
            sq.classList.add("selected");
          }
          sq.textContent = piece ? unicode[piece] : "";
          sq.onclick = () => handleSquareClick(r, c);
          boardEl.appendChild(sq);
        }
      }
    }

    function pieceColor(piece) {
      if (!piece) return null;
      return piece[0] === "w" ? "white" : "black";
    }

    function isBackRank(piece, row) {
      if (!piece) return false;
      const color = pieceColor(piece);
      return (color === "white" && row === 0) || (color === "black" && row === 7);
    }

    function handleSquareClick(r, c) {
      const piece = state.board[r][c];

      if (!state.selected) {
        if (piece && pieceColor(piece) === state.turn) {
          state.selected = { r, c };
          renderBoard();
        }
        return;
      }

      const from = state.selected;
      const moving = state.board[from.r][from.c];

      if (!moving) {
        state.selected = null;
        renderBoard();
        return;
      }

      const target = state.board[r][c];

      if (target && pieceColor(target) === pieceColor(moving)) {
        state.selected = { r, c };
        renderBoard();
        return;
      }

      tryMove(from.r, from.c, r, c);
      state.selected = null;
      renderBoard();
    }

    function isLegalMoveSimple(fromR, fromC, toR, toC) {
      const piece = state.board[fromR][fromC];
      if (!piece) return false;

      const dr = toR - fromR;
      const dc = toC - fromC;
      const absR = Math.abs(dr);
      const absC = Math.abs(dc);
      const color = pieceColor(piece);
      const target = state.board[toR][toC];

      if (target && pieceColor(target) === color) return false;

      const type = piece[1];

      if (type === "p") {
        const dir = color === "white" ? -1 : 1;
        const startRow = color === "white" ? 6 : 1;

        if (dc === 0 && !target) {
          if (dr === dir) return true;
          if (fromR === startRow && dr === dir * 2 && !state.board[fromR + dir][fromC]) return true;
        }

        if (absC === 1 && dr === dir && target && pieceColor(target) !== color) return true;
        return false;
      }

      if (type === "n") {
        return (absR === 2 && absC === 1) || (absR === 1 && absC === 2);
      }

      if (type === "k") {
        return absR <= 1 && absC <= 1;
      }

      if (type === "b" || type === "r" || type === "q") {
        const stepR = dr === 0 ? 0 : dr > 0 ? 1 : -1;
        const stepC = dc === 0 ? 0 : dc > 0 ? 1 : -1;

        if (type === "b" && absR !== absC) return false;
        if (type === "r" && !(dr === 0 || dc === 0)) return false;
        if (type === "q" && !(dr === 0 || dc === 0 || absR === absC)) return false;

        let rr = fromR + stepR;
        let cc = fromC + stepC;
        while (rr !== toR || cc !== toC) {
          if (state.board[rr][cc]) return false;
          rr += stepR;
          cc += stepC;
        }
        return true;
      }

      return false;
    }

    function tryMove(fromR, fromC, toR, toC, skipSend = false) {
      const piece = state.board[fromR][fromC];
      if (!piece) return false;

      if (!isLegalMoveSimple(fromR, fromC, toR, toC)) {
        setStatus("불가능한 수");
        return false;
      }

      const movingColor = pieceColor(piece);

      if (movingColor !== state.turn && !skipSend) {
        setStatus("아직 상대 차례입니다");
        return false;
      }

      state.board[toR][toC] = piece;
      state.board[fromR][fromC] = null;

      if (piece[1] === "p") {
        const promoRow = movingColor === "white" ? 0 : 7;
        if (toR === promoRow) {
          state.board[toR][toC] = movingColor[0] + "q";
        }
      } else {
        if (isBackRank(piece, toR)) {
          state.board[toR][toC] = movingColor[0] + "q";
        }
      }

      if (!skipSend && ws && ws.readyState === WebSocket.OPEN && document.getElementById("mode").value === "online") {
        ws.send(JSON.stringify({
          type: "move",
          from: { r: fromR, c: fromC },
          to: { r: toR, c: toC },
          piece: piece
        }));
      }

      if (!skipSend) {
        state.turn = state.turn === "white" ? "black" : "white";
      }

      renderBoard();
      setStatus(`${movingColor} 이동: ${fromR},${fromC} → ${toR},${toC}`);
      return true;
    }

    function connectWS() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        setStatus("이미 서버 연결 시도 중/연결됨");
        return;
      }

      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus("서버 연결 완료");
      };

      ws.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch (e) {
          return;
        }

        if (data.type === "connected") {
          setStatus("연결됨");
        }

        if (data.type === "room_joined") {
          mySide = data.side;
          state.online = true;
          setStatus(`방 입장 완료 - ${data.roomId} / ${mySide}`);
        }

        if (data.type === "start_game") {
          setStatus("게임 시작");
        }

        if (data.type === "move") {
          if (data.from && data.to) {
            tryMove(data.from.r, data.from.c, data.to.r, data.to.c, true);
            state.turn = state.turn === "white" ? "black" : "white";
            renderBoard();
            setStatus("상대 수 적용됨");
          }
        }

        if (data.type === "opponent_left") {
          setStatus("상대가 나갔습니다");
        }

        if (data.type === "error") {
          setStatus("에러: " + data.message);
        }
      };

      ws.onclose = () => {
        setStatus("서버 연결 종료");
      };

      ws.onerror = () => {
        setStatus("서버 연결 오류");
      };
    }

    function createRoom() {
      if (!ws || ws.readyState !== WebSocket.OPEN) connectWS();

      const roomId = document.getElementById("roomId").value.trim();
      if (!roomId) {
        setStatus("방 ID를 입력하세요");
        return;
      }

      const sendCreate = () => {
        ws.send(JSON.stringify({
          type: "create_room",
          roomId
        }));
      };

      if (ws.readyState === WebSocket.OPEN) sendCreate();
      else ws.onopen = () => {
        setStatus("서버 연결 완료");
        sendCreate();
      };
    }

    function joinRoom() {
      if (!ws || ws.readyState !== WebSocket.OPEN) connectWS();

      const roomId = document.getElementById("roomId").value.trim();
      if (!roomId) {
        setStatus("방 ID를 입력하세요");
        return;
      }

      const sendJoin = () => {
        ws.send(JSON.stringify({
          type: "join_room",
          roomId
        }));
      };

      if (ws.readyState === WebSocket.OPEN) sendJoin();
      else ws.onopen = () => {
        setStatus("서버 연결 완료");
        sendJoin();
      };
    }

    function analyzePosition() {
      setStatus("분석 기능은 아직 연결되지 않았습니다");
    }

    resetGame();
  </script>
</body>
</html>
