<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>옴니-프로모션 체스</title>
<style>
    body{margin:0;font-family:system-ui,Apple SD Gothic Neo,Segoe UI,sans-serif;text-align:center;background:#fafafa;color:#333}
    h1{margin:12px 0;font-weight:700;font-size:1.6rem}
    #connection{margin-bottom:8px}
    #connection input{padding:4px 6px;font-size:1rem;width:110px}
    #connection button{padding:4px 10px;margin-left:4px;font-size:1rem;cursor:pointer}
    #statusDot{display:inline-block;width:10px;height:10px;margin-left:4px;border-radius:50%;background:#ccc;vertical-align:middle}
    #statusDot.online{background:#2ecc71}
    #statusDot.offline{background:#e74c3c}
    #info{margin:6px 0;font-size:.9rem;color:#666;height:18px}
    canvas{background:#fff;border:2px solid #333;touch-action:none}
    /* 승급 모달 */
    #promo{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
           backdrop-filter:blur(3px);background:rgba(0,0,0,.45);z-index:10}
    #promo.hidden{display:none}
    #promo p{color:#fff;margin-bottom:12px;font-size:1.2rem;font-weight:600}
    #promo button{padding:8px 16px;margin:4px;font-size:1rem;width:90px;cursor:pointer}
</style>
</head>
<body>
<h1>옴니-프로모션 체스</h1>

<div id="connection">
    <label>
        방 코드&nbsp;
        <input id="room" placeholder="예: ABC123" />
    </label>
    <button id="create">방 만들기</button>
    <button id="join">입장</button>
    <span id="statusDot" class="offline"></span>
</div>
<div id="info"></div>

<canvas id="board" width="480" height="480"></canvas>

<!-- 승급 모달 -->
<div id="promo" class="hidden">
    <p>어떤 기물로 승급하시겠습니까?</p>
    <div>
        <button data-piece="q">퀸</button>
        <button data-piece="r">룩</button>
        <button data-piece="b">비숍</button>
        <button data-piece="n">나이트</button>
    </div>
</div>

<script>
/* ======================= 설정 ======================= */
const WS_URL = "wss://allpromotionchess.onrender.com";    // 실제 Render WebSocket 주소로 교체
const TILE   = 60;                                      // 한 칸 60px (8*60=480)
/* ===================== 유틸 함수 ===================== */
const $ = id => document.getElementById(id);
const send = (ws,obj)=> ws.readyState===1 && ws.send(JSON.stringify(obj));
const setDot = on => $("statusDot").className = on ? "online" : "offline";
const logInfo = txt => $("info").textContent = txt||"";
/* ============== 체스 엔진 (경량) ============== */
/* …―――― (엔진 클래스는 이전과 동일, 하단에 그대로 배치) ――――… */
/* ↓↓↓ 여기부터 엔진 코드 전문 ↓↓↓ */
class Chess{
    constructor(fen=Chess.START_FEN){this.load(fen);}
    load(fen){
        const [rows,turn] = fen.trim().split(/\s+/);
        this.board=[...Array(8)].map(()=>Array(8).fill(null));
        rows.split("/").forEach((row,y)=>{
            let x=0;
            for(const c of row){
                if(/\d/.test(c)){x+=+c;continue;}
                this.board[y][x++]=c;
            }
        });
        this.turn=turn;
    }
    fen(){
        const rows=this.board.map(r=>{
            let s="",n=0;
            r.forEach(p=>{
                if(!p) n++;
                else{ if(n){s+=n;n=0;} s+=p;}
            });
            return n?s+n:s;
        }).join("/");
        return `${rows} ${this.turn}`;
    }
    in(x,y){return x>=0&&x<8&&y>=0&&y<8;}
    color(p){return p===p.toUpperCase()?"w":"b";}
    dir(c){return c==="w"?-1:1;}
    back(y,c){return c==="w"?y===0:y===7;}
    clone(){return this.board.map(r=>r.slice());}
    lineClear(sx,sy,tx,ty){
        const dx=Math.sign(tx-sx),dy=Math.sign(ty-sy);
        for(let x=sx+dx,y=sy+dy;x!==tx||y!==ty;x+=dx,y+=dy)
            if(this.board[y][x]) return false;
        return true;
    }
    canMove(sx,sy,tx,ty){
        if(!this.in(sx,sy)||!this.in(tx,ty))return false;
        const p=this.board[sy][sx], c=this.color(p);
        if(c!==this.turn)return false;
        const tgt=this.board[ty][tx];
        if(tgt&&this.color(tgt)===c)return false;
        const dx=tx-sx, dy=ty-sy, adx=Math.abs(dx), ady=Math.abs(dy);
        switch(p.toLowerCase()){
            case"p":
                if(dx===0){
                    if(dy===this.dir(c)&&!tgt) return true;
                }else if(adx===1&&dy===this.dir(c)&&tgt) return true;
                return false;
            case"n": return adx*ady===2;
            case"b": return adx===ady&&this.lineClear(sx,sy,tx,ty);
            case"r": return (dx===0||dy===0)&&this.lineClear(sx,sy,tx,ty);
            case"q": return (adx===ady?this.lineClear(sx,sy,tx,ty):(dx===0||dy===0)&&this.lineClear(sx,sy,tx,ty));
            case"k": return Math.max(adx,ady)===1;
        }
        return false;
    }
    moveCoords(sx,sy,tx,ty){
        if(!this.canMove(sx,sy,tx,ty))return{ok:false};
        const piece=this.board[sy][sx];
        const next=this.clone();
        next[sy][sx]=null; next[ty][tx]=piece;
        const promo=["p","r","b","n"].includes(piece.toLowerCase())&&this.back(ty,this.turn);
        const inst=new Chess();
        inst.board=next;
        inst.turn=this.turn==="w"?"b":"w";
        return{ok:true,fen:inst.fen(),promo};
    }
    promote(x,y,ch,c){
        this.board[y][x]=c==="w"?ch.toUpperCase():ch.toLowerCase();
        this.turn=c==="w"?"b":"w";
    }
}
Chess.START_FEN="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w";
/* ===================== 전역 ===================== */
let chess=new Chess();
let socket=null, myColor="w", roomId="", dragging=null;
/* ================ 렌더링 ================ */
const ctx=$("board").getContext("2d");
const img=new Image();
img.src="https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/piece/cburnett/128.png";
function draw(){
    /* 판 */
    for(let y=0;y<8;y++)for(let x=0;x<8;x++){
        ctx.fillStyle=(x+y)&1?"#769656":"#eeeed2";
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
    /* 기물 */
    for(let y=0;y<8;y++)for(let x=0;x<8;x++){
        const p=chess.board[y][x];
        if(!p)continue;
        if(dragging&&dragging.from.x===x&&dragging.from.y===y)continue;
        drawPiece(p,x,y);
    }
    /* 드래그 그림자 */
    if(dragging){
        ctx.globalAlpha=.8;
        drawPiece(dragging.piece,(dragging.mx-30)/TILE,(dragging.my-30)/TILE,true);
        ctx.globalAlpha=1;
    }
}
function drawPiece(p,x,y,pixel=false){
    if(!img.complete)return;        // 이미지 아직이면 패스 → 판은 보임
    const map={k:0,q:1,r:2,b:3,n:4,p:5};
    const sx=map[p.toLowerCase()]*128, sy=(p===p.toUpperCase()?0:1)*128;
    const dx=pixel?x*TILE:x*TILE, dy=pixel?y*TILE:y*TILE;
    ctx.drawImage(img,sx,sy,128,128,dx,dy,TILE,TILE);
}
img.onload=draw;   // 말 그림 로드되면 다시 한번
draw();            // ★ 즉시 호출해 바둑판 먼저 그림
/* ============== 마우스 ============== */
$("board").addEventListener("mousedown",e=>{
    const r=e.target.getBoundingClientRect();
    const x=Math.floor((e.clientX-r.left)/TILE), y=Math.floor((e.clientY-r.top)/TILE);
    const p=chess.board[y][x]; if(!p||chess.color(p)!==myColor)return;
    dragging={from:{x,y},piece:p,mx:e.clientX-r.left,my:e.clientY-r.top};
});
$("board").addEventListener("mousemove",e=>{
    if(!dragging)return;
    const r=e.target.getBoundingClientRect();
    dragging.mx=e.clientX-r.left; dragging.my=e.clientY-r.top; draw();
});
$("board").addEventListener("mouseup",e=>{
    if(!dragging)return;
    const r=e.target.getBoundingClientRect();
    const tx=Math.floor((e.clientX-r.left)/TILE), ty=Math.floor((e.clientY-r.top)/TILE);
    const mv=chess.moveCoords(dragging.from.x,dragging.from.y,tx,ty); dragging=null; draw();
    if(!mv.ok)return;
    if(mv.promo) showPromo(mv,tx,ty);
    else { chess.load(mv.fen); pushMove(mv.fen); draw(); }
});
/* =============== 승급 =============== */
function showPromo(mv,x,y){
    const m=$("promo"); m.classList.remove("hidden");
    m.querySelectorAll("button").forEach(btn=>{
        btn.onclick=()=>{
            m.classList.add("hidden");
            chess.promote(x,y,btn.dataset.piece,myColor);
            pushMove(chess.fen()); draw();
        };
    });
}
/* =============== 네트워크 =============== */
function connect(){
    socket=new WebSocket(WS_URL);
    socket.onopen = ()=>setDot(true);
    socket.onclose=()=>{setDot(false);logInfo("연결 종료됨");};
    socket.onmessage=e=>{
        let msg;try{msg=JSON.parse(e.data);}catch{return;}
        if(msg.type==="sync_state"){ chess.load(msg.fen); myColor=msg.color; draw(); }
        if(msg.type==="peer_joined")  logInfo("상대가 입장했습니다!");
        if(msg.type==="peer_left")    logInfo("상대가 나갔습니다.");
    };
}
function pushMove(fen){ send(socket,{type:"sync_state",room:roomId,fen}); }
/* ===== 방 생성 / 입장 ===== */
$("create").onclick=()=>{
    if(socket)socket.close();
    roomId=$("room").value.trim().toUpperCase()||Math.random().toString(36).substr(2,6).toUpperCase();
    $("room").value=roomId; connect();
    send(socket,{type:"create",room:roomId});
    alert(`방이 생성되었습니다.\n코드: ${roomId}`); logInfo("대기 중…");
};
$("join").onclick=()=>{
    roomId=$("room").value.trim().toUpperCase();
    if(!roomId)return alert("방 코드를 입력하세요.");
    if(socket)socket.close();
    connect(); send(socket,{type:"join",room:roomId});
    logInfo("입장 시도 중…");
};
setDot(false);
</script>
</body>
</html>
