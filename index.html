<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>All Promotion Chess</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1c1c1c;
      --panel2: #222;
      --text: #f2f2f2;
      --muted: #aaa;
      --accent: #4caf50;
      --accent2: #2196f3;
      --danger: #e53935;
      --border: #333;
      --lightSq: #ddd;
      --darkSq: #769656;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 12px;
    }

    h1 {
      margin: 8px 0 12px;
      font-size: 22px;
      text-align: center;
    }

    #topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 12px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
    }

    .chip strong { color: #fff; }

    #joinPanel {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    #roomInput {
      width: min(100%, 220px);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      outline: none;
      font-size: 16px;
      text-transform: uppercase;
    }

    button {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      color: #fff;
    }

    #createBtn { background: var(--accent); }
    #joinBtn { background: var(--accent2); }
    #leaveBtn { background: var(--danger); }
    #copyBtn { background: #444; }

    #status {
      text-align: center;
      margin-bottom: 10px;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    #boardWrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    #board {
      width: min(92vw, 640px);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border: 2px solid #555;
      touch-action: manipulation;
      user-select: none;
    }

    .sq {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 6vw, 44px);
      cursor: pointer;
      position: relative;
    }

    .light { background: var(--lightSq); }
    .dark { background: var(--darkSq); }

    .selected {
      outline: 3px solid gold;
      outline-offset: -3px;
    }

    .hint::after {
      content: "";
      width: 18%;
      height: 18%;
      border-radius: 50%;
      background: rgba(0,0,0,0.28);
      position: absolute;
    }

    #promoOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 16px;
    }

    #promoBox {
      width: min(92vw, 360px);
      background: #1b1b1b;
      border: 1px solid #444;
      border-radius: 16px;
      padding: 18px;
      text-align: center;
    }

    #promoBox h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .promoBtns {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .promoBtn {
      padding: 14px 10px;
      border: none;
      border-radius: 12px;
      background: #333;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    .promoBtn:hover { background: #444; }

    .small {
      font-size: 12px;
      color: #aaa;
    }

    @media (max-width: 480px) {
      h1 { font-size: 18px; }
      #roomInput, #createBtn, #joinBtn, #leaveBtn, #copyBtn { width: 100%; }
      #joinPanel { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>All Promotion Chess</h1>

    <div id="topbar">
      <div class="chip">룸: <strong id="roomLabel">-</strong></div>
      <div class="chip">내 색: <strong id="sideLabel">-</strong></div>
      <div class="chip">턴: <strong id="turnLabel">-</strong></div>
      <div class="chip">상태: <strong id="connLabel">연결 안 됨</strong></div>
    </div>

    <div id="joinPanel">
      <input id="roomInput" type="text" placeholder="룸코드 입력" maxlength="12" />
      <button id="createBtn">룸 만들기</button>
      <button id="joinBtn">룸 입장</button>
      <button id="copyBtn">룸코드 복사</button>
      <button id="leaveBtn">나가기</button>
    </div>

    <div id="status">룸을 만들거나, 룸코드를 입력하고 입장하세요.</div>

    <div id="boardWrap">
      <div id="board"></div>
    </div>
  </div>

  <div id="promoOverlay">
    <div id="promoBox">
      <h2>프로모션 선택</h2>
      <div class="promoBtns">
        <button class="promoBtn" data-promo="q">Queen</button>
        <button class="promoBtn" data-promo="r">Rook</button>
        <button class="promoBtn" data-promo="b">Bishop</button>
        <button class="promoBtn" data-promo="n">Knight</button>
      </div>
      <p class="small">승격할 말을 선택하세요.</p>
    </div>
  </div>

  <script>
    const WS_URL = "wss://allpromotionchess.onrender.com";

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const roomLabel = document.getElementById("roomLabel");
    const sideLabel = document.getElementById("sideLabel");
    const turnLabel = document.getElementById("turnLabel");
    const connLabel = document.getElementById("connLabel");
    const roomInput = document.getElementById("roomInput");
    const promoOverlay = document.getElementById("promoOverlay");

    const createBtn = document.getElementById("createBtn");
    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const copyBtn = document.getElementById("copyBtn");

    const U = {
      w: { k: "♔", q: "♕", r: "♖", b: "♗", n: "♘", p: "♙" },
      b: { k: "♚", q: "♛", r: "♜", b: "♝", n: "♞", p: "♟" }
    };

    let ws = null;
    let connected = false;
    let roomId = "";
    let mySide = "";
    let turn = "w";
    let selected = null;
    let legalMoves = [];
    let awaitingPromotion = null;

    const initialBoard = () => ([
      ["br","bn","bb","bq","bk","bb","bn","br"],
      ["bp","bp","bp","bp","bp","bp","bp","bp"],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      ["wp","wp","wp","wp","wp","wp","wp","wp"],
      ["wr","wn","wb","wq","wk","wb","wn","wr"]
    ]);

    let board = initialBoard();

    function setStatus(msg) { statusEl.textContent = msg; }
    function setConn(msg) { connLabel.textContent = msg; }
    function setRoomLabel(msg) { roomLabel.textContent = msg; }
    function setSideLabel(msg) { sideLabel.textContent = msg; }
    function setTurnLabel(msg) { turnLabel.textContent = msg; }

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    function connect() {
      setConn("연결 중");
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        connected = true;
        setConn("연결됨");
        setStatus("서버 연결 완료.");
      };

      ws.onclose = (e) => {
        connected = false;
        setConn("끊김");
        setStatus(`연결이 끊겼습니다. code=${e.code}`);
      };

      ws.onerror = () => {
        setConn("오류");
        setStatus("웹소켓 연결 오류");
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === "connected") return;

        if (data.type === "room_joined") {
          roomId = data.roomId;
          mySide = data.side;
          setRoomLabel(roomId);
          setSideLabel(mySide === "w" ? "White" : "Black");
          roomInput.value = roomId;
          setStatus(data.message || "룸에 입장했습니다.");
          return;
        }

        if (data.type === "room_full") {
          setStatus("방이 가득 찼습니다.");
          return;
        }

        if (data.type === "opponent_joined") {
          setStatus("상대가 입장했습니다.");
          return;
        }

        if (data.type === "opponent_left") {
          setStatus("상대가 나갔습니다.");
          return;
        }

        if (data.type === "start_game") {
          setStatus("게임 시작!");
          return;
        }

        if (data.type === "move") {
          applyRemoteMove(data);
          return;
        }

        if (data.type === "sync_state") {
          if (data.state && data.state.board) {
            board = data.state.board;
            turn = data.state.turn || turn;
            render();
          }
          return;
        }
      };
    }

    function joinRoom(mode) {
      const code = roomInput.value.trim().toUpperCase();
      if (!connected) {
        setStatus("먼저 서버에 연결 중이어야 합니다.");
        return;
      }
      send({
        type: mode === "create" ? "create_room" : "join_room",
        roomId: mode === "create" ? "" : code
      });
    }

    function leaveRoom() {
      send({ type: "leave_room" });
      roomId = "";
      mySide = "";
      setRoomLabel("-");
      setSideLabel("-");
      setStatus("방에서 나왔습니다.");
    }

    function copyRoomCode() {
      const code = roomId || roomInput.value.trim();
      if (!code) {
        setStatus("복사할 룸코드가 없습니다.");
        return;
      }
      navigator.clipboard.writeText(code).then(() => {
        setStatus("룸코드가 복사되었습니다.");
      });
    }

    createBtn.addEventListener("click", () => joinRoom("create"));
    joinBtn.addEventListener("click", () => joinRoom("join"));
    leaveBtn.addEventListener("click", leaveRoom);
    copyBtn.addEventListener("click", copyRoomCode);

    function inBounds(r, c) {
      return r >= 0 && r < 8 && c >= 0 && c < 8;
    }

    function colorOf(piece) { return piece ? piece[0] : null; }
    function typeOf(piece) { return piece ? piece[1] : null; }

    function allowedToMove(piece) {
      if (!piece) return false;
      if (!mySide) return false;
      return colorOf(piece) === mySide && turn === mySide;
    }

    function isBackRank(piece, row) {
      if (!piece) return false;
      const c = colorOf(piece);
      return (c === "w" && row === 0) || (c === "b" && row === 7);
    }

    function cloneBoard(b) {
      return b.map(row => row.slice());
    }

    function makeLegalMoves(r, c) {
      const piece = board[r][c];
      if (!piece) return [];
      const col = colorOf(piece);
      const type = typeOf(piece);
      const dir = col === "w" ? -1 : 1;
      const moves = [];

      const push = (rr, cc) => {
        if (!inBounds(rr, cc)) return;
        const target = board[rr][cc];
        if (!target || colorOf(target) !== col) moves.push([rr, cc]);
      };

      if (type === "p") {
        const one = r + dir;
        if (inBounds(one, c) && !board[one][c]) {
          moves.push([one, c]);
          const start = col === "w" ? 6 : 1;
          const two = r + dir * 2;
          if (r === start && !board[two][c]) moves.push([two, c]);
        }
        for (const dc of [-1, 1]) {
          const rr = r + dir, cc = c + dc;
          if (!inBounds(rr, cc)) continue;
          const t = board[rr][cc];
          if (t && colorOf(t) !== col) moves.push([rr, cc]);
        }
      } else if (type === "n") {
        [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc]) => push(r+dr,c+dc));
      } else if (type === "b" || type === "r" || type === "q") {
        const dirs = [];
        if (type === "b" || type === "q") dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if (type === "r" || type === "q") dirs.push([-1,0],[1,0],[0,-1],[0,1]);
        for (const [dr, dc] of dirs) {
          let rr = r + dr, cc = c + dc;
          while (inBounds(rr, cc)) {
            if (!board[rr][cc]) {
              moves.push([rr, cc]);
            } else {
              if (colorOf(board[rr][cc]) !== col) moves.push([rr, cc]);
              break;
            }
            rr += dr; cc += dc;
          }
        }
      } else if (type === "k") {
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            push(r + dr, c + dc);
          }
        }
      }
      return moves;
    }

    function render() {
      boardEl.innerHTML = "";
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const sq = document.createElement("div");
          sq.className = "sq " + (((r + c) % 2 === 0) ? "light" : "dark");
          sq.dataset.r = r;
          sq.dataset.c = c;

          const piece = board[r][c];
          if (piece) sq.textContent = U[colorOf(piece)][typeOf(piece)];

          if (selected && selected.r === r && selected.c === c) sq.classList.add("selected");
          if (legalMoves.some(([rr, cc]) => rr === r && cc === c)) sq.classList.add("hint");

          sq.addEventListener("click", onSquareClick);
          boardEl.appendChild(sq);
        }
      }
      setTurnLabel(turn === "w" ? "White" : "Black");
    }

    function onSquareClick(e) {
      const r = +e.currentTarget.dataset.r;
      const c = +e.currentTarget.dataset.c;
      const piece = board[r][c];

      if (awaitingPromotion) return;

      if (selected) {
        const canMoveHere = legalMoves.some(([rr, cc]) => rr === r && cc === c);
        if (canMoveHere) {
          movePiece(selected.r, selected.c, r, c);
          selected = null;
          legalMoves = [];
          render();
          return;
        }
      }

      if (piece && allowedToMove(piece)) {
        selected = { r, c };
        legalMoves = makeLegalMoves(r, c);
        render();
      } else {
        selected = null;
        legalMoves = [];
        render();
      }
    }

    function movePiece(fr, fc, tr, tc) {
      const piece = board[fr][fc];
      const next = cloneBoard(board);
      next[tr][tc] = piece;
      next[fr][fc] = null;

      const needsPromotion =
        piece &&
        typeOf(piece) !== "k" &&
        ["p","r","b","n"].includes(typeOf(piece)) &&
        isBackRank(piece, tr);

      if (needsPromotion) {
        awaitingPromotion = { fr, fc, tr, tc, piece };
        promoOverlay.style.display = "flex";
        return;
      }

      board = next;
      turn = turn === "w" ? "b" : "w";
      render();
      send({ type: "move", from: { r: fr, c: fc }, to: { r: tr, c: tc }, piece, turn });
      send({ type: "sync_state", state: { board, turn } });
    }

    document.querySelectorAll(".promoBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        if (!awaitingPromotion) return;
        const promo = btn.dataset.promo;
        const { fr, fc, tr, tc, piece } = awaitingPromotion;

        const next = cloneBoard(board);
        const promoted = colorOf(piece) + promo;
        next[tr][tc] = promoted;
        next[fr][fc] = null;

        board = next;
        turn = turn === "w" ? "b" : "w";
        awaitingPromotion = null;
        promoOverlay.style.display = "none";
        render();

        send({
          type: "move",
          from: { r: fr, c: fc },
          to: { r: tr, c: tc },
          piece,
          promotion: promo,
          turn
        });

        send({ type: "sync_state", state: { board, turn } });
      });
    });

    function applyRemoteMove(data) {
      if (!data.from || !data.to) return;
      const fr = data.from.r, fc = data.from.c;
      const tr = data.to.r, tc = data.to.c;
      const piece = board[fr][fc];
      if (!piece) return;

      const next = cloneBoard(board);
      const promoted = data.promotion ? (colorOf(piece) + data.promotion) : piece;
      next[tr][tc] = promoted;
      next[fr][fc] = null;

      board = next;
      turn = data.turn || (turn === "w" ? "b" : "w");
      selected = null;
      legalMoves = [];
      awaitingPromotion = null;
      promoOverlay.style.display = "none";
      render();
    }

    render();
    connect();
  </script>
</body>
</html>
